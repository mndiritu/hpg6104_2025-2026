<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2x2 Epi Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-slate-50 text-slate-800 p-8">

    <div class="max-w-3xl mx-auto">
        <div class="mb-6 flex items-center justify-between">
            <h1 class="text-2xl font-bold text-slate-900">2&times;2 Epi Calculator</h1>
            <a href="index.html" class="text-sm text-sky-600 hover:underline">Back to Portal</a>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-8">
            <p class="text-sm text-slate-600 mb-6">Enter your cell counts to instantly calculate measures of frequency and association.</p>

            <div class="grid grid-cols-3 gap-4 mb-8 text-center items-center">
                <div></div>
                <div class="font-bold text-slate-700">Disease + (Cases)</div>
                <div class="font-bold text-slate-700">Disease &minus; (Controls)</div>

                <div class="font-bold text-slate-700 text-right pr-4">Exposed</div>
                <div><input type="number" id="cellA" class="w-full border-2 border-slate-200 rounded p-2 text-center text-lg focus:border-sky-500" placeholder="a"></div>
                <div><input type="number" id="cellB" class="w-full border-2 border-slate-200 rounded p-2 text-center text-lg focus:border-sky-500" placeholder="b"></div>

                <div class="font-bold text-slate-700 text-right pr-4">Unexposed</div>
                <div><input type="number" id="cellC" class="w-full border-2 border-slate-200 rounded p-2 text-center text-lg focus:border-sky-500" placeholder="c"></div>
                <div><input type="number" id="cellD" class="w-full border-2 border-slate-200 rounded p-2 text-center text-lg focus:border-sky-500" placeholder="d"></div>
            </div>

            <button onclick="calculate()" class="w-full bg-sky-600 hover:bg-sky-700 text-white font-bold py-3 rounded-lg transition-colors">
                Calculate Measures
            </button>

            <div id="results" class="hidden mt-8 space-y-4">
                <h3 class="text-lg font-bold text-slate-800 border-b pb-2">Results</h3>
                <div class="grid grid-cols-2 gap-4 text-sm">
                    <div class="bg-slate-50 p-4 rounded border border-slate-100">
                        <span class="block text-slate-500 mb-1">Risk in Exposed (I<sub>e</sub>)</span>
                        <span id="resIe" class="text-xl font-bold text-slate-900"></span>
                    </div>
                    <div class="bg-slate-50 p-4 rounded border border-slate-100">
                        <span class="block text-slate-500 mb-1">Risk in Unexposed (I<sub>u</sub>)</span>
                        <span id="resIu" class="text-xl font-bold text-slate-900"></span>
                    </div>
                    <div class="bg-sky-50 p-4 rounded border border-sky-100">
                        <span class="block text-sky-700 mb-1">Relative Risk (RR)</span>
                        <span id="resRR" class="text-2xl font-bold text-sky-900"></span>
                    </div>
                    <div class="bg-emerald-50 p-4 rounded border border-emerald-100">
                        <span class="block text-emerald-700 mb-1">Odds Ratio (OR)</span>
                        <span id="resOR" class="text-2xl font-bold text-emerald-900"></span>
                    </div>
                    <div class="bg-rose-50 p-4 rounded border border-rose-100 col-span-2">
                        <span class="block text-rose-700 mb-1">Risk Difference (RD)</span>
                        <span id="resRD" class="text-xl font-bold text-rose-900"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function calculate() {
            const a = parseFloat(document.getElementById('cellA').value) || 0;
            const b = parseFloat(document.getElementById('cellB').value) || 0;
            const c = parseFloat(document.getElementById('cellC').value) || 0;
            const d = parseFloat(document.getElementById('cellD').value) || 0;

            const n1 = a + b; // Total exposed
            const n0 = c + d; // Total unexposed

            if (n1 === 0 || n0 === 0) {
                alert("Please ensure totals for exposed and unexposed are greater than zero.");
                return;
            }

            const ie = a / n1;
            const iu = c / n0;
            const rr = ie / iu;
            const or = (a * d) / (b * c);
            const rd = ie - iu;

            document.getElementById('resIe').innerText = (ie * 100).toFixed(2) + '%';
            document.getElementById('resIu').innerText = (iu * 100).toFixed(2) + '%';
            document.getElementById('resRR').innerText = rr.toFixed(2);
            document.getElementById('resOR').innerText = isFinite(or) ? or.toFixed(2) : "Undefined";
            document.getElementById('resRD').innerText = (rd * 100).toFixed(2) + '% (Absolute Difference)';

            document.getElementById('results').classList.remove('hidden');
        }
    </script>
</body>
</html>
