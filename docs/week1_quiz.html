<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Week 1 Practice Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-slate-50 text-slate-800 p-8">

    <div class="max-w-2xl mx-auto">
        <div class="mb-6 flex items-center justify-between">
            <h1 class="text-2xl font-bold text-slate-900">Frequency & Association Quiz</h1>
            <a href="index.html" class="text-sm text-emerald-600 hover:underline">Back to Portal</a>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-8" id="quiz-container">
            </div>

        <div id="result-container" class="hidden mt-6 bg-emerald-50 border border-emerald-200 p-6 rounded-xl text-center">
            <h2 class="text-2xl font-bold text-emerald-800 mb-2">Quiz Complete!</h2>
            <p class="text-emerald-700">You scored <span id="score" class="font-bold text-xl"></span> out of 4.</p>
            <p class="text-sm text-emerald-600 mt-4">"Most errors were denominator errors: risk vs rate. Remember to always check your tables!"</p>
            <button onclick="location.reload()" class="mt-4 bg-emerald-600 text-white px-4 py-2 rounded font-medium hover:bg-emerald-700 transition">Retry Quiz</button>
        </div>
    </div>

    <script>
        const questions = [
            {
                question: "Town population = 10,000. Current flu cases = 500. What is the point prevalence?",
                options: ["5%", "50%", "0.05 per 1,000", "50 per 10,000"],
                correct: 0,
                explanation: "500 / 10,000 = 0.05 or 5%."
            },
            {
                question: "In a 2-year cohort, Exposed: 60 cases / 1,200 persons. Unexposed: 30 cases / 1,500 persons. What is the Relative Risk (RR)?",
                options: ["1.5", "2.0", "2.5", "3.0"],
                correct: 2,
                explanation: "Ie = 60/1200 = 0.05. Iu = 30/1500 = 0.02. RR = 0.05/0.02 = 2.5."
            },
            {
                question: "In a case-control study: Cases (Exposed 80, Unexposed 20). Controls (Exposed 50, Unexposed 50). What is the Odds Ratio (OR)?",
                options: ["2.5", "3.0", "4.0", "8.0"],
                correct: 2,
                explanation: "OR = (a*d) / (b*c) = (80 * 50) / (20 * 50) = 4000 / 1000 = 4."
            },
            {
                question: "A student says: 'OR=4 means exposed are 4x as likely to get disease.' Is this always correct?",
                options: ["Yes, OR and RR are always the same.", "No, it is only true when the outcome is common.", "No, OR only approximates RR when the outcome is rare.", "Yes, as long as P-values are significant."],
                correct: 2,
                explanation: "OR only approximates RR (risk) when the outcome is rare and controls represent the source population."
            }
        ];

        let currentQ = 0;
        let score = 0;
        const container = document.getElementById('quiz-container');

        function loadQuestion() {
            if (currentQ >= questions.length) {
                container.classList.add('hidden');
                document.getElementById('result-container').classList.remove('hidden');
                document.getElementById('score').innerText = score;
                return;
            }

            const q = questions[currentQ];
            let html = `<h2 class="text-lg font-bold text-slate-800 mb-4">Q${currentQ + 1}: ${q.question}</h2><div class="space-y-3">`;
            
            q.options.forEach((opt, idx) => {
                html += `
                    <button onclick="checkAnswer(${idx})" class="w-full text-left p-4 rounded-lg border border-slate-200 hover:border-emerald-500 hover:bg-emerald-50 transition-colors">
                        ${opt}
                    </button>
                `;
            });
            html += `</div><div id="feedback" class="mt-4 hidden p-3 rounded text-sm"></div>`;
            container.innerHTML = html;
        }

        function checkAnswer(selected) {
            const q = questions[currentQ];
            const feedback = document.getElementById('feedback');
            feedback.classList.remove('hidden');
            
            if (selected === q.correct) {
                score++;
                feedback.classList.add('bg-emerald-100', 'text-emerald-800');
                feedback.innerHTML = `<strong>Correct!</strong> ${q.explanation}`;
            } else {
                feedback.classList.add('bg-rose-100', 'text-rose-800');
                feedback.innerHTML = `<strong>Incorrect.</strong> ${q.explanation}`;
            }

            setTimeout(() => {
                currentQ++;
                loadQuestion();
            }, 2500); // 2.5 second delay before next question
        }

        // Init
        loadQuestion();
    </script>
</body>
</html>
